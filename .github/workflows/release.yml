name: Release desktop app

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version a publier, ex: v0.1.1"
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb,rpm"
            rust_targets: ""
          - platform: windows-latest
            args: "--bundles nsis"
            rust_targets: ""
          - platform: macos-13
            args: "--target x86_64-apple-darwin --bundles dmg"
            rust_targets: "x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
            rust_targets: "aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust with target
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.version || github.ref_name }}
          releaseName: "Finance Dashboard ${{ inputs.version || github.ref_name }}"
          releaseBody: "Installers desktop et manifeste de mise a jour Tauri."
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
          retryAttempts: 2
